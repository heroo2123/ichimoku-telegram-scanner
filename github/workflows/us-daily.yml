name: US Markets Daily Ichimoku Scan

on:
  workflow_dispatch:
  schedule:
    # Runs Monday-Friday at 23:17 UTC, which is after the normal US cash-market close
    # in both daylight-saving and standard-time seasons.
    - cron: '17 23 * * 1-5'

permissions:
  contents: write

concurrency:
  group: us-daily-ichimoku-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Run US markets scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner.py --market us

      - name: Commit updated scanner state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/scan_state.json data/heartbeat.json data/last_run_summary.json || true
          git diff --cached --quiet || git commit -m "Update US scanner state"
          git push || true
